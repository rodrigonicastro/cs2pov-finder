services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pov
      POSTGRES_PASSWORD: pov
      POSTGRES_DB: cs2_pov_notifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pov -d cs2_pov_notifier"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
